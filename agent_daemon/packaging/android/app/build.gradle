apply plugin: 'com.android.application'

android {
    namespace 'com.personalaiops.agent'
    compileSdk 36

    defaultConfig {
        applicationId "com.personalaiops.agent"
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName "0.3.8"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
        debug {
            applicationIdSuffix ".debug"
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
}
