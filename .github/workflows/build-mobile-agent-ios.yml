name: Build Mobile Agent iOS App

on:
  workflow_dispatch:
  push:
    paths:
      - "mobile_wrapper/**"
      - ".github/workflows/build-mobile-agent-ios.yml"

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile_wrapper

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "value=$(tr -d '[:space:]' < ../agent_daemon/VERSION)" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mobile_wrapper/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Ensure iOS platform
        run: npm run cap:ensure:ios

      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install

      - name: Build unsigned iOS simulator app
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ../../build/ios-sim \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Stage iOS simulator app in agent dist
        run: |
          mkdir -p ../agent_daemon/dist
          ditto -c -k --sequesterRsrc --keepParent build/ios-sim/Build/Products/Debug-iphonesimulator/App.app ../agent_daemon/dist/PersonalAIOpsAgent-${{ steps.version.outputs.value }}-ios-simulator-app.zip

      - name: Upload iOS dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: PersonalAIOpsAgent-dist-ios
          path: agent_daemon/dist/PersonalAIOpsAgent-${{ steps.version.outputs.value }}-ios-simulator-app.zip
          if-no-files-found: error
