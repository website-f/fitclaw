name: Build Agent Windows

on:
  workflow_dispatch:
  push:
    paths:
      - "agent_daemon/**"
      - ".github/workflows/build-agent-windows.yml"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: powershell
        run: |
          $value = (Get-Content agent_daemon\VERSION -Raw).Trim()
          "value=$value" >> $env:GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y

      - name: Build Windows Agent
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          powershell -ExecutionPolicy Bypass -File agent_daemon\packaging\windows\build.ps1 -Version "${{ steps.version.outputs.value }}"

      - name: Upload Windows dist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PersonalAIOpsAgent-dist-windows
          path: |
            agent_daemon/dist/PersonalAIOpsAgent-${{ steps.version.outputs.value }}-windows-x64.exe
            agent_daemon/dist/PersonalAIOpsAgent-${{ steps.version.outputs.value }}-windows-x64-setup.exe
          if-no-files-found: error
