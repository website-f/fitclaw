<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1120" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Clear Data" />
  <title>FitClaw Clear Data</title>
  <link rel="manifest" href="/app-manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/app-assets/icons/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/app-assets/chat-app.css" />
  <link rel="stylesheet" href="/app-assets/clear-data.css?v=20260417-clear1" />
</head>
<body class="cd-body" data-cd-category="">
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>
  <div class="ambient ambient-c"></div>

  <main class="cd-shell">
    <header class="cd-topbar glass-card">
      <div class="cd-topbar-copy">
        <p class="eyebrow">Storage</p>
        <h1>Clear data</h1>
      </div>
      <div class="cd-topbar-actions">
        <div class="status-pill" id="cdStatusPill">Loading...</div>
        <a class="icon-button cd-topbar-icon" href="/app" aria-label="Back to chat" title="Back to chat">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M2 8.2l2 2V5l-2 1.2M2 8.2l5.2 5.2v-2.6s3.6-.2 6.8 2.6c.4-5.8-3-8.8-6.8-8.8V2.4L2 8.2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        </a>
        <a class="icon-button cd-topbar-icon" href="/" aria-label="Home" title="Home">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M2 7.5L8 2l6 5.5V14a.5.5 0 01-.5.5H10v-4.5H6V14.5H2.5A.5.5 0 012 14V7.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        </a>
        <button class="icon-button cd-topbar-icon" id="cdRefreshButton" type="button" aria-label="Refresh" title="Refresh">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M2 8a6 6 0 0110-4.3M14 8a6 6 0 01-10 4.3M12.5 2v3.2H9.3M3.5 14v-3.2H6.7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </header>

    <section class="cd-summary glass-card">
      <div class="cd-summary-copy">
        <p class="eyebrow">Total disk used</p>
        <strong id="cdSummaryTotal">-</strong>
        <span id="cdSummaryCount">0 items across 0 categories</span>
      </div>
      <p class="cd-summary-hint">Pick a category to review files. Use the checkboxes to delete in bulk, or Remove all to wipe the whole folder.</p>
    </section>

    <!-- Category list / overview -->
    <section class="cd-category-grid" id="cdCategoryGrid"></section>

    <!-- Detail panel -->
    <section class="cd-detail-panel glass-card" id="cdDetailPanel" hidden>
      <div class="cd-detail-head">
        <button class="icon-button cd-back-button" id="cdBackButton" type="button" aria-label="Back to categories">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3l-5 5 5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="cd-detail-title">
          <p class="eyebrow" id="cdDetailEyebrow">Category</p>
          <h2 id="cdDetailTitle">-</h2>
          <p class="cd-detail-path" id="cdDetailPath">-</p>
        </div>
        <div class="cd-detail-meta">
          <span id="cdDetailTotalSize">0 B</span>
          <span id="cdDetailCount">0 items</span>
        </div>
      </div>

      <div class="cd-detail-actions">
        <label class="cd-check">
          <input type="checkbox" id="cdSelectAll" />
          <span>Select all on this page</span>
        </label>
        <div class="cd-action-buttons">
          <button class="ghost-button small-button" id="cdSelectClear" type="button">Clear selection</button>
          <button class="ghost-button small-button danger-button" id="cdDeleteSelected" type="button" disabled>Delete selected</button>
          <button class="primary-button small-button danger-button" id="cdRemoveAll" type="button">Remove all</button>
        </div>
      </div>

      <div class="cd-item-list" id="cdItemList"></div>

      <div class="cd-pager" id="cdPager" hidden>
        <button class="ghost-button small-button" id="cdPagerPrev" type="button" disabled>Prev</button>
        <span class="cd-pager-label" id="cdPagerLabel">1 / 1</span>
        <button class="ghost-button small-button" id="cdPagerNext" type="button" disabled>Next</button>
      </div>
    </section>
  </main>

  <script src="/app-assets/clear-data.js?v=20260417-clear1" defer></script>
</body>
</html>
