# Prometheus scrape config.
# Each `job_name` is one service being monitored. `targets` are resolved
# via Docker's internal DNS — the service name from docker-compose.yml.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: vps_stats
    static_configs:
      - targets: ["vps_stats:8090"]
    metrics_path: /metrics

  - job_name: api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  # Add future services here. When a service goes to Kubernetes, replace
  # the static_configs block with kubernetes_sd_configs.
