x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - ./data:/data
  restart: unless-stopped

services:
  api:
    <<: *app-common
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${API_BIND_IP:-0.0.0.0}:${API_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/live || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  bot:
    <<: *app-common
    command: >
      sh -c "if [ \"$${TELEGRAM_BOT_ENABLED:-true}\" = \"false\" ];
      then echo 'Telegram bot disabled for this environment' && tail -f /dev/null;
      else python -m app.bot.runner; fi"
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

  worker:
    <<: *app-common
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

  beat:
    <<: *app-common
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy

  flower:
    <<: *app-common
    command: celery -A app.core.celery_app.celery_app flower --port=${FLOWER_PORT:-5555}
    ports:
      - "${FLOWER_BIND_IP:-0.0.0.0}:${FLOWER_PORT:-5555}:5555"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    env_file:
      - .env
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-45m}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-8192}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      OLLAMA_MAX_QUEUE: ${OLLAMA_MAX_QUEUE:-128}
      OLLAMA_FLASH_ATTENTION: ${OLLAMA_FLASH_ATTENTION:-1}
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    restart: unless-stopped
    ports:
      - "${OLLAMA_BIND_IP:-0.0.0.0}:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./docker/ollama/entrypoint.sh:/entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 20s

  n8n:
    image: n8nio/n8n:latest
    env_file:
      - .env
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      GENERIC_TIMEZONE: ${TIMEZONE}
      N8N_SECURE_COOKIE: "false"
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-change-this-n8n-password}
    restart: unless-stopped
    ports:
      - "${N8N_BIND_IP:-0.0.0.0}:${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n

  whatsapp-bridge:
    build:
      context: ./whatsapp_bridge
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      WHATSAPP_BRIDGE_SERVER_ADDR: :8080
      WHATSAPP_BRIDGE_API_TOKEN: ${WHATSAPP_BETA_BRIDGE_API_TOKEN}
    restart: unless-stopped
    volumes:
      - whatsapp_bridge_data:/app/store

volumes:
  redis_data:
  ollama_data:
  n8n_data:
  whatsapp_bridge_data:
